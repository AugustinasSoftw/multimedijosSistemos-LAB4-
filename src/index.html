<!DOCTYPE html>
<html>
<head>
    <title>Lab 4 - WebRTC Face Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/tracking-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.1.3/data/face-min.js"></script>
    
    <style>
        body { text-align: center; background-color: #2c3e50; color: white; font-family: Arial; }
        .video-container { position: relative; display: inline-block; width: 640px; height: 480px; margin-top: 20px;}
        /* Absolute positioning forces the canvas to sit perfectly on top of the webcam video */
        video, canvas { position: absolute; top: 0; left: 0; width: 640px; height: 480px; border: 2px solid white; border-radius: 8px;}
        video { background: #000; }
    </style>
</head>
<body>
    <h2>Lab 4: Real-Time Face Detection</h2>
    
    <div class="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="face-canvas" width="640" height="480"></canvas>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
